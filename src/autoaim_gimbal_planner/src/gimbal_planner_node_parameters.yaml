gimbal_planner_node:
  autoaim_mode: {
    type: int,
    default_value: 0,
    description: "autoaim mode, 0: armor, 1: small_energy, 2: big_energy"
  }
  max_yaw_acc: {
    type: double,
    default_value: 50.0,
    description: "max yaw acc"
  }
  max_pitch_acc: {
    type: double,
    default_value: 100.0,
    description: "max pitch acc"
  }
  Q_yaw: {
    type: double_array,
    default_value: [9e6, 0.0],
    description: "Q yaw"
  }
  Q_pitch: {
    type: double_array,
    default_value: [9e6, 0.0],
    description: "Q pitch"
  }
  R_yaw: {
    type: double_array,
    default_value: [1.0],
    description: "R yaw"
  }
  R_pitch: {
    type: double_array,
    default_value: [1.0],
    description: "R pitch"
  }
  fire_thresh: {
    type: double,
    default_value: 0.003,
    description: "fire thresh"
  }
  decision_speed: {
    type: double,
    default_value: 8,
    description: "decision speed"
  }
  high_speed_delay_time: {
    type: double,
    default_value: 0.030,
    description: "high speed delay time"
  }
  low_speed_delay_time: {
    type: double,
    default_value: 0.015,
    description: "low speed delay time"
  }
  pitch_offset: {
    type: double,
    default_value: -1.4,
    description: "pitch offset"
  }
  yaw_offset: {
    type: double,
    default_value: -1.0,
    description: "yaw offset"
  }
